databaseChangeLog:
  - changeSet:
      id: 003-create-user-dialog-state-table
      author: freddykray
      changes:
        - createTable:
            tableName: user_dialog_state
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_user_dialog_state

              - column:
                  name: state
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: payload
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false