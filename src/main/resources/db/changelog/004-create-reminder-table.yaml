databaseChangeLog:
  - changeSet:
      id: 004-create-reminder-table
      author: freddykray
      changes:
        - createTable:
            tableName: reminder
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_reminder
                    nullable: false

              - column:
                  name: chat_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: deadline
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

              - column:
                  name: remind_at
                  type: TIMESTAMP WITH TIME ZONE

              - column:
                  name: reminder_sent
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false