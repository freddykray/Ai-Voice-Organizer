databaseChangeLog:
  - changeSet:
      id: 002-create-telegram-user-table
      author: freddykray
      changes:
        - createTable:
            tableName: telegram_user
            columns:
              - column:
                  name: chat_id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_telegram_user
                    nullable: false

              - column:
                  name: remind_before_hours
                  type: INT
                  defaultValueNumeric: 3
                  constraints:
                    nullable: false